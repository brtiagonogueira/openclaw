# OpenClaw Railway deployment configuration
# See https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
startCommand = "mkdir -p /tmp/.openclaw && node -e \"require('fs').writeFileSync('/tmp/.openclaw/openclaw.json', JSON.stringify({gateway:{controlUi:{dangerouslyAllowHostHeaderOriginFallback:true}}}))\" && OPENCLAW_STATE_DIR=/tmp/.openclaw node openclaw.mjs gateway --allow-unconfigured --port 18789 --bind lan"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

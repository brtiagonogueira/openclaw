# OpenClaw Railway deployment configuration
# See https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
startCommand = "mkdir -p /tmp/.openclaw ; node -e \"require('fs').writeFileSync('/tmp/.openclaw/openclaw.json', JSON.stringify({gateway:{controlUi:{dangerouslyAllowHostHeaderOriginFallback:true}}}))\" ; exec node openclaw.mjs gateway --allow-unconfigured --port 8080 --bind lan"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

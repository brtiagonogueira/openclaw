# OpenClaw Railway deployment configuration
# See https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
startCommand = "mkdir -p /tmp/.openclaw /tmp/.openclaw-workspace && node -e \"require('fs').writeFileSync('/tmp/.openclaw/openclaw.json', JSON.stringify({gateway:{controlUi:{dangerouslyAllowHostHeaderOriginFallback:true}}}))\" && unset OPENCLAW_STATE_DIR && unset OPENCLAW_WORKSPACE_DIR && OPENCLAW_STATE_DIR=/tmp/.openclaw OPENCLAW_WORKSPACE_DIR=/tmp/.openclaw-workspace node openclaw.mjs gateway --allow-unconfigured --port 8080 --bind lan"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
